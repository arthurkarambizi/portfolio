        <section class="hero">
            <div class="hero-info">
                <h1> CONTACT ME.</h1>
            </div>
        </section>

    <main class="clear">
        <section class="contact container">
            <div class="form-info">
                <h2> I’d love to hear from you! You can also find me on LinkedIn and GitHub.</h2>
            </div>

            <form class="form" action="#" name="form" method="get" autocomplete="off" onsubmit="return validate();">
                <label for="fullName">Name :</label>
                <input class="input-text" id="fullName" type="text" name="fullName" placeholder="Name">
                <label for="email">Email :</label>
                <input class="input-text" id="email" type="email" name="email" placeholder="Email">
                <label for="phone">Phone :</label>
                <input class="input-text" id="phone" type="tel" name="phone" placeholder="Telephone Number (Optional)">
                <label for="company">company :</label>
                <input class="input-text" id="company" type="text" name="company" placeholder="Company Name (Optional)">
                <label for="mailing">Mailing Address :</label>
                <input class="input-text" id="mailing" type="text" name="Mailing" placeholder="Mailing Address (Optional)">
                <label for="comment">Comment/Questions :</label>
                <textarea class="text-area" name="comment" id="comment" cols="40" rows="10"></textarea>
                <input class="input-button" type="submit" value="Send Message">
            </form>
        </section>
    </main>

    <footer>
